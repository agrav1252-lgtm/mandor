name: Build Mandor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 (for Gradle + jpackage)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download Zulu JDK 11 (for Windows 7 runtime)
        shell: pwsh
        run: |
          $url = "https://cdn.azul.com/zulu/bin/zulu11.88.17-ca-jdk11.0.31-win_x64.zip"
          $output = "$env:RUNNER_TEMP\zulu11.zip"
          Invoke-WebRequest -Uri $url -OutFile $output
          Expand-Archive -Path $output -DestinationPath "$env:RUNNER_TEMP\zulu11"

      - name: Build minimal JRE with Zulu JDK 11
        shell: pwsh
        run: |
          $zuluHome = Join-Path $env:RUNNER_TEMP "zulu11\zulu11.88.17-ca-jdk11.0.31-win_x64"
          $jlink = Join-Path $zuluHome "bin\jlink.exe"
          $output = Join-Path $env:RUNNER_TEMP "custom-jre"
          # collect all available module names
          $all = & "$zuluHome\bin\java" --list-modules 2>&1 | ForEach-Object { $_.Split('@')[0] }
          $exclude = @('jdk.jlink','jdk.jdeps','jdk.rmic','jdk.javadoc','jdk.jcmd','jdk.jconsole','jdk.jdi','jdk.jdwp.agent','jdk.jshell','jdk.jstatd','jdk.hotspot.agent','jdk.internal.jvmstat','jdk.internal.le','jdk.internal.opt')
          $modules = $all | Where-Object { $exclude -notcontains $_ }
          $moduleList = $modules -join ','
          Write-Host "Modules: $moduleList"
          & $jlink --add-modules $moduleList --output $output --strip-debug --no-header-files --no-man-pages --compress=1

      - name: Build MSI
        shell: pwsh
        env:
          CUSTOM_JRE_PATH: "${{ runner.temp }}\\custom-jre"
        run: .\gradlew packageMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Mandor-Windows-MSI
          path: build/compose/binaries/main/msi/*.msi
